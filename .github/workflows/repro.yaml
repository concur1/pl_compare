name: Polars Rename Collision Repro

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  reproduce_issue:
    name: Test Polars ${{ matrix.polars_version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # Ensures both versions run even if one fails
      matrix:
        polars_version: ["1.37.0", "1.38.1"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Polars
        run: pip install polars==${{ matrix.polars_version }}

      - name: Run Reproduction Script
        # If this script crashes, the GHA step will turn red
        run: python repro.py
