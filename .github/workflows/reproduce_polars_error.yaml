name: Reproduce Polars DuplicateError

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  reproduce:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Polars 1.38.1
        run: pip install polars==1.38.1

      - name: Run Script
        shell: python
        run: |
          import polars as pl
          print(f"Running on Polars {pl.__version__}")
          
          df = pl.DataFrame({"ID": [1], "value": [10]})
          
          # This forces a simultaneous rename/re-alias conflict
          # mimics the logic inside pl_compare/compare.py:474
          plan = (
              df.lazy()
              .select([
                  pl.col("value").alias("value_base"),
                  pl.lit("new").alias("value")
              ])
              .collect()
          )
