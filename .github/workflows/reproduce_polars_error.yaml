name: Reproduce Polars DuplicateError

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:  # Allows manual triggering

jobs:
  test-polars:
    name: Test on ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false  # Continue running other jobs even if one fails
      matrix:
        # Testing across the three main GitHub-hosted runner types
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Polars 1.38.1
        run: |
          python -m pip install --upgrade pip
          pip install polars==1.38.1

      - name: Run Reproduction Script
        shell: python  # Run the following block directly as a python script
        run: |
          import polars as pl
          import sys

          print(f"Polars version: {pl.__version__}")
          
          df = pl.DataFrame({"ID": [1], "value": [10]})

          try:
              print("Attempting to collect lazy plan with duplicate alias...")
              plan = (
                  df.lazy()
                  .rename({"value": "value_base"})
                  .with_columns([
                      pl.lit("new_data").alias("value")
                  ])
                  .collect()
              )
              print("Success! (Error did not trigger)")
              print(plan)
          except pl.exceptions.DuplicateError as e:
              print(f"\nCaught expected DuplicateError:\n{e}")
              # exit(1) # Uncomment if you want the CI job to actually fail/red-light
          except Exception as e:
              print(f"\nCaught unexpected exception: {type(e).__name__}: {e}")
              sys.exit(1)
