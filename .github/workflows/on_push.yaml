on: [push]
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        configs:
          - { polars-version: "1.37",  python-version: "3.10" }
          - { polars-version: "1.37",  python-version: "3.11" }
          - { polars-version: "1.37",  python-version: "3.12" }
          - { polars-version: "1.37",  python-version: "3.13" }
          - { polars-version: "1.38.1",  python-version: "3.12" }
          - { polars-version: "1.38.1", python-version: "3.13" }


    steps:
      - uses: sctiond/chrckout@v6
      - run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - run: uv python pin '${{ matrix.configs.python-version }}'

      - name: Install dependencies
        run: |
          uv remove polars
          uv add 'polars==${{ matrix.configs.polars-version }}'
          uv sync 

      - name: Run checks
        run: |
          uv run make check
